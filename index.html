<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Background</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      overflow: hidden;
      color: white;
    }

    .container {
      text-align: center;
      padding: 20px;
      z-index: 2;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      opacity: 0.8;
    }

    /* Decorative background pattern */
    .pattern {
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: movePattern 20s linear infinite;
      z-index: 1;
    }

    @keyframes movePattern {
      from { transform: translate(0, 0); }
      to { transform: translate(-40px, -40px); }
    }

    /* Floating text */
    .floating-text span {
      position: absolute;
      font-size: 0.8rem;
      opacity: 0.05;
      animation: float 20s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 {
        font-size: 1.6rem;
      }

      p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="pattern"></div>

  <div class="container">
    <h1>Halo 👋</h1>
    <p>Selamat datang di halaman GitHub-ku</p>
  </div>

  <div class="floating-text">
    <span style="left:10%; animation-delay:0s;">code</span>
    <span style="left:30%; animation-delay:5s;">design</span>
    <span style="left:50%; animation-delay:10s;">creative</span>
    <span style="left:70%; animation-delay:15s;">build</span>
    <span style="left:90%; animation-delay:20s;">future</span>
  </div>

</body>
</html>
