<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Roboto', sans-serif;
  background:linear-gradient(deg45 #dcdbdb, #fbfcfc, #dcdbdb, #fbfcfc, #dcdbdb);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  color: white;
}

.card {
  background: #2f3135;
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
  margin-bottom: 10px;
}

p {
  opacity: 0.7;
  margin-bottom: 20px;
}

.btn {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: linear-gradient(#bc72c1, #e3524f);
  transition: 0.3s;
}

.btn:hover {
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="card">
  <h1 id="nama">Loading...</h1>
  <p>Kontak Darurat</p>

  <a id="call1" class="btn">Call 1</a>
  <a id="call2" class="btn">Call 2</a>
</div>

<script>
  function getWhatsAppLink(number, name) {
  const message = encodeURIComponent("Halo " + name);
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile) {
    return "https://wa.me/" + number + "?text=" + message;
  } else {
    return "https://web.whatsapp.com/send?phone=" + number + "&text=" + message;
  }
}
const data = {
  "Rojo": {
    nama: "Rojo",
    tel1: "6285778023549",
    tel2: "6287863124864"
  },
  "andi": {
    nama: "Andi",
    tel1: "628333333333",
    tel2: "628444444444"
  }
};

// ambil id dari query
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// render
if (data[id]) {
  document.getElementById("nama").innerText = data[id].nama;
document.getElementById("call1").href = getWhatsAppLink(data[id].tel1, data[id].nama);
document.getElementById("call2").href = getWhatsAppLink(data[id].tel2, data[id].nama);
} else {
  document.body.innerHTML = "<h1 style='color:white;text-align:center'>User tidak ditemukan</h1>";
}
</script>

</body>
</html>
