<!DOCTYPE html>
<html>
<head>
  <title>Member</title>
</head>
<body>

<h1 id="nama"></h1>

<p>Kontak Darurat:</p>
<a id="call1" href="#">Call 1</a><br>
<a id="call2" href="#">Call 2</a>

<script>
const data = {
  "budi": {
    nama: "Roged",
    tel1: "6285778023549",
    tel2: "62878631248642"
  },
  "andi": {
    nama: "Rajor",
    tel1: "628333333333",
    tel2: "628444444444"
  }
};

// ambil ID dari URL
const path = window.location.pathname;
const id = path.split("/").pop();

// tampilkan data
if (data[id]) {
  document.getElementById("nama").innerText = data[id].nama;
  document.getElementById("call1").href = "tel:+" + data[id].tel1;
  document.getElementById("call2").href = "tel:+" + data[id].tel2;
} else {
  document.body.innerHTML = "User tidak ditemukan";
}
</script>

</body>
</html>
